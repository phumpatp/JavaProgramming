#log4j.rootLogger=INFO, stdout

log4j.logger.th.co.ais=DEBUG, stdout
log4j.logger.test=DEBUG, stdout
log4j.logger.org.java.at=DEBUG, stdout
log4j.logger.ErrorLogger=ERROR, stdout

log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%-5p %d{dd-MM-yy HH:mm:ss}- %C{1}(%L) - %m%n
